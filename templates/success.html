<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Timetable Generated</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <h2 class="mb-4">Timetable Generated Successfully</h2>

    {% if files and files|length > 0 %}
    <div class="list-group mb-4" id="filesList">
        {% for file in files %}
        <a href="{{ url_for('download_file', filename=file) }}" class="list-group-item list-group-item-action" target="_blank">
            {{ file }}
        </a>
        {% endfor %}
    </div>
    {% else %}
    <div class="alert alert-warning">No files found.</div>
    {% endif %}

    <a href="{{ url_for('builder') }}" class="btn btn-primary">Go Back</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
