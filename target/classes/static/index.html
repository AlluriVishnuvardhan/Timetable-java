<!DOCTYPE html>
<html>
<head>
    <title>Automatic Timetable Generator</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        button { padding: 10px 20px; font-size: 16px; }
        table { border-collapse: collapse; margin-top: 30px; }
        th, td { border: 1px solid black; padding: 8px; text-align: center; }
        th { background: #f2f2f2; }
    </style>
</head>
<body>

<h2>Automatic Timetable Generator (Load Based)</h2>

<input type="file" id="fileInput" />
<button onclick="uploadFile()">Upload & Generate</button>

<div id="output"></div>

<script>
async function uploadFile() {

    const fileInput = document.getElementById("fileInput");
    const file = fileInput.files[0];

    if (!file) {
        alert("Please select an Excel file.");
        return;
    }

    const formData = new FormData();
    formData.append("file", file);

    const response = await fetch("/api/timetable/upload", {
        method: "POST",
        body: formData
    });

    const result = await response.text();

    document.getElementById("output").innerHTML =
        "<h3>" + result + "</h3>";
}
</script>

</body>
</html>
